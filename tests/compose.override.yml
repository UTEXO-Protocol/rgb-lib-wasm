services:
  regtest-helper:
    build:
      context: ./regtest-helper
    ports:
      - "8080:8080"
    environment:
      BITCOIND_RPC_URL: http://bitcoind:18443
      BITCOIND_RPC_USER: user
      BITCOIND_RPC_PASS: default_password
    depends_on:
      - bitcoind

  # Override esplora to always start (upstream has it in 'tests' profile)
  esplora:
    profiles: []

  # Override VSS services to always start (upstream has them in 'vss' profile)
  # Upstream exposes vss-server on 8081; CORS proxy on 8082 for browser tests
  vss-postgres:
    profiles: []

  vss-server:
    profiles: []

  # CORS reverse proxy for browser-based WASM tests
  vss-cors-proxy:
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      - ./vss-server/nginx-cors.conf:/etc/nginx/conf.d/default.conf:ro
